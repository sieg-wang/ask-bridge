name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
            ext: tar.xz
          - target: x86_64-apple-darwin
            os: macos-15-intel
            ext: tar.xz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.xz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package binary
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/ask-bridge"
          $updateBinary = "target/${{ matrix.target }}/release/ask-bridge-update"
          if ("${{ runner.os }}" -eq "Windows") {
            $binary = "$binary.exe"
            $updateBinary = "$updateBinary.exe"
          }
          if (!(Test-Path $binary)) {
            throw "Missing built binary: $binary"
          }
          if (!(Test-Path $updateBinary)) {
            throw "Missing updater binary: $updateBinary"
          }

          New-Item -ItemType Directory -Force dist | Out-Null
          $archive = "dist/ask-bridge-${{ matrix.target }}.${{ matrix.ext }}"
          if ("${{ matrix.ext }}" -eq "zip") {
            Compress-Archive -Path $binary, $updateBinary -DestinationPath $archive -Force
          } else {
            $binaryDir = Split-Path $binary
            $binaryLeaf = Split-Path $binary -Leaf
            $updateBinaryLeaf = Split-Path $updateBinary -Leaf
            tar -cJf $archive -C $binaryDir $binaryLeaf $updateBinaryLeaf
          }

          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $(Split-Path $archive -Leaf)" | Out-File "$archive.sha256" -Encoding ascii
      - uses: actions/upload-artifact@v4
        with:
          name: ask-bridge-${{ matrix.target }}
          path: dist/*

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/* --clobber
          else
            gh release create "$TAG" artifacts/* --verify-tag --generate-notes
          fi
