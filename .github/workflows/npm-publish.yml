name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install supported npm version
        run: npm install -g npm@11.18.0
      - name: Align npm version with release tag
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          if [ "$CURRENT_VERSION" != "$VERSION" ]; then
            npm version "$VERSION" --no-git-tag-version --allow-same-version
          else
            echo "package.json already at v$VERSION; skip npm version update"
          fi
      - name: Publish
        run: npm publish --provenance --access public
        env:
          ASK_CHATGPT_RELEASE_ASSET_RETRIES: 12
          ASK_CHATGPT_RELEASE_ASSET_RETRY_DELAY_MS: 10000
