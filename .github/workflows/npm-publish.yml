name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Update npm to latest
        run: npm install -g npm@latest
      - name: Align npm version with release tag
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version
      - name: Publish
        run: npm publish --provenance --access public
        env:
          ASK_CHATGPT_RELEASE_ASSET_RETRIES: 12
          ASK_CHATGPT_RELEASE_ASSET_RETRY_DELAY_MS: 10000
